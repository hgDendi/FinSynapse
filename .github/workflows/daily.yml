name: Daily ingest + dashboard publish

# Triggers:
#  - schedule: every day at 22:00 UTC = 06:00 BJT (after A-share close,
#    ~1h after US close).
#  - workflow_dispatch: manual run from the Actions UI for testing.
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

# Default to read-only at workflow level — least privilege. Any future
# job added to this workflow inherits read-only unless it explicitly opts
# into more. The single existing job below opts into the writes it needs.
permissions:
  contents: read

concurrency:
  group: daily
  cancel-in-progress: false  # never cancel a partial-data publish

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # Required by:
      #   - "Commit generated brief back to main" — push to main
      #   - "Deploy dashboard to GitHub Pages" (peaceiris) — push to gh-pages
      contents: write
      # Required by "Open issue on failure" — auto-file CI failure issue
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python deps
        run: uv sync --frozen

      - name: Ingest all sources (bronze)
        env:
          # FRED key is the only ingest secret. AkShare/yfinance/multpl
          # need no auth. LLM keys NEVER live in CI per plan §0.
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: uv run finsynapse ingest all --lookback-days 5500

      - name: Transform bronze -> silver (incl. temperature, divergence, health)
        run: uv run finsynapse transform run --layer all

      - name: Generate daily macro brief (LLM narrative or deterministic template)
        # brief.py provider="auto" order: ollama → deepseek → anthropic → template.
        # In CI ollama always fails (no localhost); if DEEPSEEK_API_KEY is set
        # in repo secrets, deepseek wins. With no key configured at all, the
        # deterministic template fires — output is still a valid .md.
        # Model choice: deepseek-v4-pro (current top-tier) is 75% off through
        # 2026-05-31 — same price tier as v4-flash for now, swap back to
        # deepseek-v4-flash after the discount window if cost matters.
        # `|| true` so a transient brief failure doesn't block publish.
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run finsynapse report brief --provider deepseek --model deepseek-v4-pro || true

      - name: Render bilingual static dashboard
        run: uv run finsynapse dashboard render --out-dir dist

      - name: Commit generated brief back to main
        # The brief is content the team reviews historically; check it into
        # the repo (small markdown, no binary), not just an artifact. Skips
        # cleanly when nothing changed (e.g. transform aborted earlier).
        # Retries with rebase on push rejection — the workflow runs for a
        # few minutes, and a manual push to main during that window would
        # otherwise hard-fail this step.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain data/gold/brief/)" ]; then
            echo "[brief] no new/changed brief files — skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/gold/brief/
          git commit -m "chore(brief): daily macro brief $(date -u +%Y-%m-%d)"

          branch="${{ github.ref_name }}"
          for attempt in 1 2 3; do
            git fetch origin "$branch"
            # Rebase our brief commit on top of any concurrent main pushes
            # (data/gold/brief/*.md is the only file we touch — no conflict
            # possible unless two daily runs raced, which concurrency:
            # cancel-in-progress: false already prevents).
            git rebase "origin/$branch" || { git rebase --abort; exit 1; }
            if git push origin "HEAD:$branch"; then
              echo "[brief] pushed on attempt $attempt"
              exit 0
            fi
            echo "[brief] push rejected on attempt $attempt — retrying after rebase"
            sleep 2
          done
          echo "[brief] push still failing after 3 attempts — giving up"
          exit 1

      - name: Push state-change notifications (skipped if no secrets)
        env:
          BARK_DEVICE_KEY: ${{ secrets.BARK_DEVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: uv run finsynapse notify check

      - name: Upload silver as artifact (30-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: silver-${{ github.run_id }}
          path: data/silver/
          retention-days: 30

      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: "publish dashboard ${{ github.run_number }}"
          # Don't keep history bloated — squash to one commit per push.
          force_orphan: true

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[CI] Daily ingest failed ${today}`,
              labels: ['ci-failure', 'auto'],
              body: [
                `Daily workflow failed.`,
                ``,
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                `Likely culprits:`,
                `- AkShare upstream rename / EastMoney scrape break`,
                `- multpl HTML structure change`,
                `- yfinance rate-limit (curl-cffi backoff)`,
                `- FRED secret missing/expired`,
                ``,
                `Re-run from the Actions UI once root cause is fixed.`,
              ].join('\n')
            });
