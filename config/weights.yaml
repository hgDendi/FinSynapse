# FinSynapse market thermometer weights.
# See plan §11. Edit and re-run `finsynapse transform run --layer temperature`
# to apply. Changes are NOT retroactive: percentile baselines themselves
# don't depend on these weights.

# How the three sub-temperatures combine into the overall (per market).
sub_weights:
  cn: { valuation: 0.5, sentiment: 0.3, liquidity: 0.2 }
  hk: { valuation: 0.6, sentiment: 0.25, liquidity: 0.15 }
  us: { valuation: 0.4, sentiment: 0.35, liquidity: 0.25 }  # US estimated CAPE+PE so val weight slightly lower

# Within each sub-temperature, how to combine the input indicators.
# Sub-indicator weights MUST sum to 1.0 within each block.
# Direction: "+" = high percentile -> high temp; "-" = high percentile -> low temp (cold).
indicator_weights:
  us_valuation:
    us_pe_ttm:    { weight: 0.5, direction: "+" }
    us_cape:      { weight: 0.5, direction: "+" }
  us_sentiment:
    vix:          { weight: 1.0, direction: "-" }   # VIX high = fear = cold
  us_liquidity:
    us10y_real_yield: { weight: 0.5, direction: "-" }   # higher real rate = tighter = cold
    dxy:              { weight: 0.5, direction: "-" }   # stronger dollar = tighter global liquidity = cold

  # --- CN (Phase 1b) ---------------------------------------------------
  cn_valuation:
    csi300_pe_ttm:           { weight: 0.5, direction: "+" }
    csi300_pb:               { weight: 0.5, direction: "+" }
  cn_sentiment:
    # Northbound 5d net-buy. AkShare upstream stopped publishing daily flow
    # in mid-2024 (regulator change). After Phase 1c we co-weight with
    # A-share total turnover (5d mean), which IS still daily and gives a
    # broader participation signal. North-flow gets the heavier weight
    # because it captures *foreign* sentiment specifically; turnover blends
    # foreign + domestic. When north flow goes NaN (post-2024-08), calc
    # renormalizes turnover to 100% — degraded but not blank.
    cn_north_5d:             { weight: 0.5, direction: "+" }   # inflow = warm
    cn_a_turnover_5d:        { weight: 0.5, direction: "+" }   # high participation = warm
  cn_liquidity:
    cn_m2_yoy:               { weight: 0.5, direction: "+" }   # higher M2 growth = looser
    cn_social_financing_12m: { weight: 0.5, direction: "+" }   # higher credit creation = looser

  # --- HK (Phase 1c) ---------------------------------------------------
  hk_valuation:
    # HSI PE/PB has no free source. EWH (iShares MSCI HK ETF, US-listed)
    # has 30y daily history with reliable dividends → use TTM dividend
    # yield as inverse-valuation proxy. Direction "-" because HIGH yield
    # = CHEAP = COLD valuation temperature.
    hk_ewh_yield_ttm:        { weight: 1.0, direction: "-" }
  hk_sentiment:
    # Southbound 5d net-buy. AH-premium index and HSI options PCR both
    # unavailable for free (plan §11.6 fallback) → south flow alone.
    cn_south_5d:             { weight: 1.0, direction: "+" }
  hk_liquidity:
    # HK liquidity tracks USD funding conditions (plan §11.2 — HK borrows US).
    us10y_real_yield:        { weight: 0.5, direction: "-" }
    dxy:                     { weight: 0.5, direction: "-" }

# Percentile window used by the temperature calculator (must match a key in
# transform.percentile.WINDOWS).
percentile_window: pct_10y
