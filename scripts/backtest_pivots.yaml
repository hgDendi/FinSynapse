# Market temperature validation pivots.
# 34 historically significant market tops/bottoms across US/CN/HK.
#
# Schema per pivot:
#   label         — human-readable name
#   market        — cn | hk | us
#   date          — YYYY-MM-DD (the extreme day ±5 trading days)
#   expected_zone — cold | mid | hot
#   source        — citation (Bloomberg headline or widely-recognised phrase)
#   index         — the reference index to validate against (for forward-return analysis)
#   confirmed_by  — optional: corroborating signal(s)
#   risk_type     — optional: categorisation for diagnostic drill-down
#                   (policy_shock | credit_event | geopolitical | liquidity_crisis |
#                    valuation_extreme | currency_crisis | pandemic | structured_product)
#
# Selection rule: per market, ≥5 bottoms (>20% drawdown from prior peak)
# and ≥3 tops (>50% rally from prior trough), covering 2011–2025.
# Risk-type coverage is enforced: every risk_type must appear in ≥1 pivot
# per market, so a backtest can isolate which regimes the thermometer
# handles well and which it systematically misses.
# Template-generated, LLM-augmented, and human-reviewed.

