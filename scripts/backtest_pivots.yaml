# Market temperature validation pivots.
# 24 historically significant market tops/bottoms across US/CN/HK.
#
# Schema per pivot:
#   label        — human-readable name
#   market       — cn | hk | us
#   date         — YYYY-MM-DD (the extreme day ±5 trading days)
#   expected_zone — cold | mid | hot
#   source        — citation (Bloomberg headline or widely-recognised phrase)
#   index         — the reference index to validate against (for forward-return analysis)
#   confirmed_by  — optional: corroborating signal(s)
#
# Selection rule: per market, ≥3 bottoms (>20% drawdown from prior peak)
# and ≥2 tops (>50% rally from prior trough), covering 2015–2025.
# Template-generated then LLM-augmented and human-reviewed.

